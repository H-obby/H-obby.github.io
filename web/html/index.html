<!DOCTYPE html>
<html lang="en">
  <head>
    <title>WebProject</title>
    <meta property="og:title" content="WebProject" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta charset="utf-8" />
    <meta property="twitter:card" content="summary_large_image" />
    <link
      rel="stylesheet"
      href="https://unpkg.com/animate.css@4.1.1/animate.css"
    />
    <link
      rel="shortcut icon"
      href="../public/practicum.svg"
      type="icon/png"
      sizes="32x32"
    />
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Inter:wght@100;200;300;400;500;600;700;800;900&amp;display=swap"
      data-tag="font"
    />
    <link
      rel="stylesheet"
      href="https://unpkg.com/@teleporthq/teleport-custom-scripts/dist/style.css"
    />
    <style>
      [data-thq="thq-dropdown"]:hover > [data-thq="thq-dropdown-list"] {
          display: flex;
        }

        [data-thq="thq-dropdown"]:hover > div [data-thq="thq-dropdown-arrow"] {
          transform: rotate(90deg);
        }
    </style>
  </head>
  <body>
    <link rel="stylesheet" href="../styles/style.css" />
    <div>
      <link href="../styles/index.css" rel="stylesheet" />

      <div class="index-container">
        <header data-role="Header" class="header-header">
          <div class="header-logo-name">
            <img src="../public/practicum2.svg" class="header-image" />
          </div>
          <div class="header-btn-group">
            <a href="login-page.html" class="header-auth button">
              <span>Authentification</span>
            </a>
          </div>
        </header>
        <div class="index-hero">
          <span class="index-text">La recherche de stage simplifiée</span>
          <h1 class="index-text1">
            Où l'éducation rencontre l'expérience, pour un avenir professionnel
            brillant.
          </h1>
          <a href="login-page.html" class="index-navlink button">
            S'authentifier
          </a>
        </div>
        <footer class="footer-footer footer-root-class-name1">
          <span class="footer-tdr">
            <span>© 2024 Practicum, Tous droits réservés.</span>
          </span>
          <span class="footer-mentions-lgales">
            <span>Mentions légales</span>
          </span>
          <div class="footer-icon-group">
            <button class="footer-auth button">
              <span>
                <span>Assistance</span>
                <br />
              </span>
            </button>
          </div>
        </footer>
      </div>
    </div>
    <script
      defer=""
      src="https://unpkg.com/@teleporthq/teleport-custom-scripts"
    ></script>
  </body>
</html>
