    <link rel="stylesheet" href="../styles/style.css" />
    <div>
      <link href="../styles/modif-offre-entre.css" rel="stylesheet" />

      <div class="modif-offre-entre-container">
        <header
          data-role="Header"
          class="logged-in-header-header logged-in-header-root-class-name8"
        >
          <div class="logged-in-header-logo-name">
            <img
              alt="Logo Practicum"
              src="../public/practicum2.svg"
              class="logged-in-header-image"
            />
          </div>
          <div class="search-bar-container search-bar-root-class-name2">
            <div class="search-bar-container1">
              <img
                alt="image"
                src="../public/search-svgrepo-com%20(1).svg"
                class="search-bar-image"
              />
              <input
                type="text"
                placeholder="Rechercher"
                class="search-bar-textinput input"
              />
            </div>
          </div>
          <div class="logged-in-header-container">
            <div class="logged-in-header-btn-group">
              <button type="button" class="logged-in-header-button button">
                <img
                  alt="image"
                  src="../public/notification-12-svgrepo-com.svg"
                  class="logged-in-header-image1"
                />
              </button>
              <button type="button" class="logged-in-header-button1 button">
                <img
                  alt="image"
                  src="../public/leetram-200h.png"
                  class="logged-in-header-image2"
                />
              </button>
            </div>
          </div>
        </header>
        <main class="modif-offre-entre-main">
          <div class="modif-offre-entre-container1">
            <form autocomplete="new-password" class="modif-offre-entre-form">
              <input
                type="text"
                placeholder="Site de l'entreprise"
                autocomplete="new-password"
                class="modif-offre-entre-site-entreprise input"
              />
              <input
                type="text"
                placeholder="Adresse du siège"
                autocomplete="new-password"
                class="modif-offre-entre-adresse input"
              />
              <input
                type="text"
                placeholder="N° de téléphone"
                autocomplete="new-password"
                class="modif-offre-entre-tel input"
              />
              <input
                type="text"
                placeholder="Nom du contact"
                autocomplete="new-password"
                class="modif-offre-entre-nom-contact input"
              />
              <input
                type="text"
                placeholder="E-Mail du contact"
                autocomplete="new-password"
                class="modif-offre-entre-mail-contact input"
              />
              <select class="modif-offre-entre-select">
                <option
                  value="Option 1"
                  disabled="true"
                  selected="true"
                  class="modif-offre-entre-option"
                >
                  Secteur d'activité
                </option>
                <option value="Option 2">Informatique</option>
                <option value="Option 3">BTP</option>
              </select>
            </form>
            <div class="modif-offre-entre-container2">
              <button type="button" class="modif-offre-entre-button button">
                POSTER
              </button>
            </div>
          </div>
          <div class="modif-offre-entre-main-text-content">
            <input
              type="text"
              placeholder="Nom de l'entreprise"
              autocomplete="new-password"
              class="modif-offre-entre-intitul-stage input"
            />
            <textarea
              placeholder="Description de l'entreprise"
              autocomplete="off"
              class="modif-offre-entre-textarea textarea"
            ></textarea>
          </div>
        </main>
        <footer class="footer-footer footer-root-class-name7">
          <span class="footer-tdr">
            <span>© 2024 Practicum, Tous droits réservés.</span>
          </span>

          </span>
