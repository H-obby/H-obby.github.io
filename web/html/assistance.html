        <style>
            [data-thq="thq-dropdown"]:hover>[data-thq="thq-dropdown-list"] {
                display: flex;

            [data-thq="thq-dropdown"]:hover>div [data-thq="thq-dropdown-arrow"] {

    <title>Assistance</title>
    <link rel="stylesheet" href="../styles/assistance.css">

<body>
    <div class="container">
        <header class="header">
            <div class="logged-in-header-logo-name">
                <img alt="Logo Practicum" src="../public/practicum2.svg" class="logged-in-header-image" />
    </header>
    
    <h1>Page d'Assistance</h1>

    <section id="contact">
        <h2>Contactez-nous</h2>
        <br>
        <p>Par Telephone : +33156615605 Sinon,</p>
        <br>
        <p>Si vous avez besoin d'aide supplémentaire, n'hésitez pas à nous contacter.</p>
        <br>
        <form action="" method="post" class="contact-form">
            <label for="name">Nom:</label>
            <input type="text" id="name" name="name" required>
            <label for="email">Email:</label>
            <input type="email" id="email" name="email" required>
            <label for="message">Message:</label>
            <textarea id="message" name="message" required></textarea>
            <input type="submit" value="Envoyer">
        </form>
    </section>
    <footer class="footer-footer footer-root-class-name1">
        <span class="footer-tdr">
            <span>© 2024 Practicum, Tous droits réservés.</span>
        </span>
        <span class="footer-mentions-lgales">
            <span>Mentions légales</span>
        </span>
        <div class="footer-icon-group">
            <button class="footer-auth button">
                <span>
                    <span> <a href="assistance.html">Assistance</a>
                    </span>
                    <br />
                </span>
            </button>
        </div>
    </footer>
<script defer="" src="https://unpkg.com/@teleporthq/teleport-custom-scripts"></script>
