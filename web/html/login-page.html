<!DOCTYPE html>
<html lang="en">
  <head>
    <title>Login-Page - WebProject</title>
    <meta property="og:title" content="Login-Page - WebProject" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta charset="utf-8" />
    <meta property="twitter:card" content="summary_large_image" />
    <link
      rel="stylesheet"
      href="https://unpkg.com/animate.css@4.1.1/animate.css"
    />
    <link
      rel="shortcut icon"
      href="../public/practicum.svg"
      type="icon/png"
      sizes="32x32"
    />
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Inter:wght@100;200;300;400;500;600;700;800;900&amp;display=swap"
      data-tag="font"
    />
    <link
      rel="stylesheet"
      href="https://unpkg.com/@teleporthq/teleport-custom-scripts/dist/style.css"
    />
    <style>
      [data-thq="thq-dropdown"]:hover > [data-thq="thq-dropdown-list"] {
          display: flex;
        }

        [data-thq="thq-dropdown"]:hover > div [data-thq="thq-dropdown-arrow"] {
          transform: rotate(90deg);
        }
    </style>
  </head>
  <body>
    <link rel="stylesheet" href="../styles/style.css" />
    <div>
      <link href="../styles/login-page.css" rel="stylesheet" />

      <div class="login-page-container">
        <header data-role="Header" class="header-header header-root-class-name">
          <div class="header-logo-name">
            <img src="../public/practicum2.svg" class="header-image" />
          </div>
          <div class="header-btn-group">
            <a href="login-page.html" class="header-auth button">
              <span>Authentification</span>
            </a>
          </div>
        </header>
        <div class="login-page-login-page">
          <h1 class="login-page-text">
            <span>Connection</span>
            <br />
          </h1>
          <form class="login-page-form">
            <input
              type="text"
              placeholder="Nom d'utilisateur"
              class="login-page-username input"
              id="Nom utilisateur"
            />
            <input
              type="password"
              placeholder="Mot de passe"
              class="login-page-password input"
              id="mdp"
            />
          </form>
          <a href="logged-in-landing.html" class="login-page-navlink button">
            Se connecter
          </a>
        </div>
        <footer class="footer-footer footer-root-class-name1">
          <span class="footer-tdr">
            <span>© 2024 Practicum, Tous droits réservés.</span>
          </span>
          <div class="footer-mentions-lgales">Mentions légales<a href="mentions-lgales.html"></a></div>
          <div class="footer-icon-group">
            <button class="footer-auth button Content">
              <span>
                <span>Assistance</span>
                <br />
              </span>
            </button>
          </div>
        </footer>
      </div>
    </div>
    <script
      defer=""
      src="https://unpkg.com/@teleporthq/teleport-custom-scripts"
    ></script>
  </body>
</html>
